# linuxptp profile for interface eno2np1 using UDPv4 transport.
# Unicast negotiation mode: slave requests Announce/Sync/DelayResp from
# the grandmaster at 204.114.29.59 via Signaling messages.

[global]
twoStepFlag              1
clientOnly               1
time_stamping            hardware
network_transport        UDPv4
delay_mechanism          E2E
domainNumber             0
announceReceiptTimeout   3
syncReceiptTimeout       3
logAnnounceInterval      1
logSyncInterval          0
logMinDelayReqInterval   0
summary_interval         1
unicast_req_duration     300

[unicast_master_table]
table_id                 1
logQueryInterval         2
UDPv4                    204.114.29.59

[eno2np1]
unicast_master_table     1
